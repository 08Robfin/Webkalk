<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web-Kalk</title>
</head>
<body>
    <div id="fakultet">
        <h2>Fakultet</h2>
        <form>
            <input name="tall" placeholder="Tall" type="number">
            <button>Regn ut fakultet</button>
        </form>
        <p>
            Resultatet er: <span class="resultat"></span>
        </p>
    </div>

    <div id="fizzbuzz">
        <h2>FizzBuzz</h2>
        <form>
            <input name="tall" placeholder="Tall" type="number">
            <button>Regn ut FizzBuzz</button>
        </form>
        <p>
            Resultatet er: <span class="resultat"></span>
        </p>
    </div>

    <div id="fibonacci">
        <h2>Fibonacci</h2>
        <form>
            <input name="tall" placeholder="Tall" type="number">
            <button>Regn ut Fibonacci</button>
        </form>
        <p>
            Resultatet er: <span class="resultat"></span>
        </p>
    </div>

    <script type="module">
        import { fakultet } from './fakultet.js'
        import { fizzBuzz } from './fizzbuzz.js'
        import { fibonacci } from './fibonacci.js'

        function regnUt(seksjon, fn) {
            const input = document.querySelector(`#${seksjon} input`)
            const output = document.querySelector(`#${seksjon} .resultat`)
            const tall = parseInt(input.value)
            output.textContent = fn(tall)
        }

        document.querySelector('#fakultet button')
            .addEventListener('click', e => { e.preventDefault(); regnUt('fakultet', fakultet) })

        document.querySelector('#fizzbuzz button')
            .addEventListener('click', e => { e.preventDefault(); regnUt('fizzbuzz', fizzBuzz) })

        document.querySelector('#fibonacci button')
            .addEventListener('click', e => { e.preventDefault(); regnUt('fibonacci', fibonacci) })
    </script>
</body>
</html>
