<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web-Kalk 🌈 RGB EXTREME</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: #000;
            overflow-x: hidden;
            position: relative;
            min-height: 100vh;
        }

        /* Animated background gradient */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(-45deg,
                #ff0080, #ff8c00, #40e0d0, #ff0080,
                #00ff00, #ff00ff, #0080ff, #ff0080
            );
            background-size: 400% 400%;
            animation: backgroundGradient 15s ease infinite;
            z-index: -2;
            opacity: 0.1;
        }

        @keyframes backgroundGradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Dark overlay for readability */
        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 50%, rgba(0,0,0,0.4), rgba(0,0,0,0.8)),
                        radial-gradient(circle at 80% 50%, rgba(0,0,0,0.4), rgba(0,0,0,0.8));
            z-index: -1;
            pointer-events: none;
            animation: overlayPulse 4s ease-in-out infinite;
        }

        @keyframes overlayPulse {
            0%, 100% { opacity: 0.7; }
            50% { opacity: 0.5; }
        }

        header {
            text-align: center;
            padding: 40px 20px;
            position: relative;
            z-index: 10;
        }

        h1 {
            font-size: 5em;
            font-weight: 900;
            margin-bottom: 20px;
            animation: rainbowTitle 2s linear infinite;
            text-shadow:
                0 0 10px #ff0080,
                0 0 20px #00ff00,
                0 0 30px #0080ff,
                0 0 40px #ffff00,
                0 0 50px #ff0080;
            letter-spacing: 5px;
            transform: perspective(1000px) rotateX(0deg);
        }

        @keyframes rainbowTitle {
            0% {
                color: #ff0080;
                text-shadow: 0 0 10px #ff0080, 0 0 20px #00ff00, 0 0 30px #0080ff, 0 0 40px #ffff00, 0 0 50px #ff0080;
                transform: scale(1) rotateX(0deg);
            }
            25% {
                color: #00ff00;
                text-shadow: 0 0 20px #00ff00, 0 0 30px #0080ff, 0 0 40px #ffff00, 0 0 50px #ff00ff, 0 0 60px #00ff00;
                transform: scale(1.05) rotateX(5deg);
            }
            50% {
                color: #0080ff;
                text-shadow: 0 0 30px #0080ff, 0 0 40px #ffff00, 0 0 50px #ff0080, 0 0 60px #00ff00, 0 0 70px #0080ff;
                transform: scale(1.1) rotateX(0deg);
            }
            75% {
                color: #ffff00;
                text-shadow: 0 0 20px #ffff00, 0 0 30px #ff0080, 0 0 40px #00ff00, 0 0 50px #0080ff, 0 0 60px #ffff00;
                transform: scale(1.05) rotateX(-5deg);
            }
            100% {
                color: #ff0080;
                text-shadow: 0 0 10px #ff0080, 0 0 20px #00ff00, 0 0 30px #0080ff, 0 0 40px #ffff00, 0 0 50px #ff0080;
                transform: scale(1) rotateX(0deg);
            }
        }

        .subtitle {
            font-size: 1.5em;
            color: #00ffff;
            text-shadow: 0 0 15px #00ffff, 0 0 30px #ff00ff;
            animation: subtitleFlash 1s ease-in-out infinite;
            margin-bottom: 30px;
        }

        @keyframes subtitleFlash {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.7; transform: scale(1.1); }
        }

        main {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
            position: relative;
            z-index: 5;
        }

        .container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 40px;
            margin-bottom: 50px;
        }

        .gif-container {
            display: inline-block;
            width: 120px;
            height: 120px;
            margin: 10px;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 0 30px rgba(255, 0, 128, 0.8);
            animation: gifBounce 2s ease-in-out infinite;
        }

        .gif-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .gif-top-left {
            position: absolute;
            top: 20px;
            left: 20px;
            animation: gifBounce 2s ease-in-out infinite;
        }

        .gif-top-right {
            position: absolute;
            top: 20px;
            right: 20px;
            animation: gifBounce 2.5s ease-in-out infinite 0.3s;
        }

        .gif-bottom-left {
            position: absolute;
            bottom: 20px;
            left: 20px;
            animation: gifBounce 3s ease-in-out infinite 0.6s;
        }

        @keyframes gifBounce {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(5deg); }
        }

        .calc-card {
            background: linear-gradient(135deg, rgba(10, 10, 40, 0.95), rgba(30, 10, 50, 0.95));
            padding: 40px;
            border-radius: 20px;
            position: relative;
            overflow: visible;
            border: 3px solid transparent;
            background-clip: padding-box;
            animation: cardFloat 3s ease-in-out infinite;
        }

        .card-gif-left {
            position: absolute;
            left: -80px;
            top: 50%;
            transform: translateY(-50%);
            width: 100px;
            height: 100px;
            border-radius: 50%;
            overflow: hidden;
            box-shadow: 0 0 25px rgba(0, 255, 0, 0.8);
            animation: gifSpin 4s linear infinite;
        }

        .card-gif-right {
            position: absolute;
            right: -80px;
            top: 50%;
            transform: translateY(-50%);
            width: 100px;
            height: 100px;
            border-radius: 50%;
            overflow: hidden;
            box-shadow: 0 0 25px rgba(0, 128, 255, 0.8);
            animation: gifSpin 5s linear infinite reverse;
        }

        .card-gif-left img,
        .card-gif-right img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        @keyframes gifSpin {
            0% { transform: translateY(-50%) rotate(0deg); }
            100% { transform: translateY(-50%) rotate(360deg); }
        }

        .floating-gifs {
            position: fixed;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            pointer-events: none;
            z-index: 2;
        }

        .float-gif {
            position: absolute;
            width: 100px;
            height: 100px;
            border-radius: 50%;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(255, 0, 128, 0.7);
            animation: float 8s ease-in-out infinite;
        }

        .float-gif img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .float-1 { top: 15%; left: 5%; animation: float 8s ease-in-out infinite 0s; }
        .float-2 { top: 60%; right: 8%; animation: float 10s ease-in-out infinite 1s; }
        .float-3 { top: 25%; right: 15%; animation: float 12s ease-in-out infinite 0.5s; }
        .float-4 { bottom: 15%; left: 10%; animation: float 9s ease-in-out infinite 1.5s; }
        .float-5 { top: 70%; left: 50%; animation: float 11s ease-in-out infinite 0.8s; }

        @keyframes float {
            0%, 100% { transform: translateY(0px) translateX(0px); }
            25% { transform: translateY(-30px) translateX(20px); }
            50% { transform: translateY(-60px) translateX(-20px); }
            75% { transform: translateY(-30px) translateX(30px); }
        }

        .bottom-gifs {
            display: flex;
            justify-content: space-around;
            gap: 20px;
            margin-top: 80px;
            flex-wrap: wrap;
            padding: 40px;
        }

        .bottom-gif {
            width: 140px;
            height: 140px;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 0 35px rgba(0, 255, 0, 0.8), 0 0 50px rgba(255, 0, 128, 0.6);
            animation: bottomPulse 2s ease-in-out infinite;
        }

        .bottom-gif img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        @keyframes bottomPulse {
            0%, 100% { transform: scale(1) rotate(0deg); }
            50% { transform: scale(1.1) rotate(5deg); }
        }

        @keyframes cardFloat {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
        }

        /* Rainbow border */
        .calc-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            border: 3px solid transparent;
            border-radius: 20px;
            background: linear-gradient(135deg, #ff0080, #00ff00, #0080ff, #ffff00) border-box;
            animation: borderRainbow 3s linear infinite;
            pointer-events: none;
            z-index: 1;
        }

        @keyframes borderRainbow {
            0% {
                border-image: linear-gradient(135deg, #ff0080, #00ff00, #0080ff, #ffff00) 1;
                box-shadow: 0 0 20px rgba(255, 0, 128, 0.8), inset 0 0 30px rgba(255, 0, 128, 0.3);
            }
            33% {
                border-image: linear-gradient(135deg, #00ff00, #0080ff, #ffff00, #ff0080) 1;
                box-shadow: 0 0 20px rgba(0, 255, 0, 0.8), inset 0 0 30px rgba(0, 255, 0, 0.3);
            }
            66% {
                border-image: linear-gradient(135deg, #0080ff, #ffff00, #ff0080, #00ff00) 1;
                box-shadow: 0 0 20px rgba(0, 128, 255, 0.8), inset 0 0 30px rgba(0, 128, 255, 0.3);
            }
            100% {
                border-image: linear-gradient(135deg, #ff0080, #00ff00, #0080ff, #ffff00) 1;
                box-shadow: 0 0 20px rgba(255, 0, 128, 0.8), inset 0 0 30px rgba(255, 0, 128, 0.3);
            }
        }

        /* Shimmer effect inside */
        .calc-card::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.1) 0%, transparent 70%);
            animation: shineEffect 4s linear infinite;
            pointer-events: none;
            z-index: 0;
        }

        @keyframes shineEffect {
            0% { transform: translate(-50%, -50%) rotate(0deg); }
            100% { transform: translate(50%, 50%) rotate(360deg); }
        }

        .calc-content {
            position: relative;
            z-index: 2;
        }

        h2 {
            color: #00ffff;
            font-size: 2em;
            margin-bottom: 25px;
            animation: titleBounce 1s ease-in-out infinite;
            text-shadow: 0 0 10px #00ffff, 0 0 20px #ff00ff, 0 0 30px #ff0080;
            letter-spacing: 2px;
        }

        @keyframes titleBounce {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        form {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
            flex-wrap: wrap;
            align-items: center;
        }

        input {
            flex: 1;
            min-width: 150px;
            padding: 15px 20px;
            font-size: 1.1em;
            background: rgba(0, 20, 40, 0.8);
            color: #00ff00;
            border: 2px solid #ff0080;
            border-radius: 10px;
            font-family: 'Courier New', monospace;
            transition: all 0.3s ease;
            box-shadow:
                0 0 15px rgba(255, 0, 128, 0.5),
                inset 0 0 15px rgba(255, 0, 128, 0.2);
            animation: inputGlow 2s ease-in-out infinite;
        }

        @keyframes inputGlow {
            0%, 100% {
                border-color: #ff0080;
                box-shadow: 0 0 15px rgba(255, 0, 128, 0.5), inset 0 0 15px rgba(255, 0, 128, 0.2);
            }
            50% {
                border-color: #00ffff;
                box-shadow: 0 0 25px rgba(0, 255, 255, 0.7), inset 0 0 20px rgba(0, 255, 255, 0.3);
            }
        }

        input::placeholder {
            color: #00ff00;
            opacity: 0.6;
        }

        input:focus {
            outline: none;
            border-color: #00ffff;
            box-shadow:
                0 0 30px rgba(0, 255, 255, 0.8),
                inset 0 0 20px rgba(0, 255, 255, 0.4);
            transform: scale(1.05);
        }

        button {
            padding: 15px 40px;
            font-size: 1.1em;
            font-weight: bold;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            background: linear-gradient(135deg, #ff0080, #00ff00, #0080ff, #ffff00, #ff0080);
            background-size: 300% 300%;
            color: #000;
            text-shadow: 0 0 5px rgba(255, 255, 255, 0.8);
            box-shadow:
                0 0 20px #ff0080,
                0 0 40px #00ff00,
                0 0 60px #0080ff,
                0 0 80px #ffff00;
            animation: buttonGlow 1.5s ease-in-out infinite;
            transition: all 0.2s ease;
            position: relative;
            overflow: hidden;
            white-space: nowrap;
        }

        @keyframes buttonGlow {
            0% {
                box-shadow: 0 0 20px #ff0080, 0 0 40px #00ff00, 0 0 60px #0080ff, 0 0 80px #ffff00;
                transform: scale(1);
            }
            50% {
                box-shadow: 0 0 30px #ff0080, 0 0 60px #00ff00, 0 0 90px #0080ff, 0 0 120px #ffff00;
                transform: scale(1.05);
            }
            100% {
                box-shadow: 0 0 20px #ff0080, 0 0 40px #00ff00, 0 0 60px #0080ff, 0 0 80px #ffff00;
                transform: scale(1);
            }
        }

        button:hover {
            animation: buttonExplode 0.5s ease-out forwards;
            box-shadow:
                0 0 40px #ff0080,
                0 0 80px #00ff00,
                0 0 120px #0080ff,
                0 0 160px #ffff00,
                inset 0 0 30px rgba(255, 255, 255, 0.4);
        }

        @keyframes buttonExplode {
            0% {
                transform: scale(1);
            }
            100% {
                transform: scale(1.15);
                box-shadow:
                    0 0 40px #ff0080,
                    0 0 80px #00ff00,
                    0 0 120px #0080ff,
                    0 0 160px #ffff00,
                    inset 0 0 30px rgba(255, 255, 255, 0.4);
            }
        }

        button:active {
            animation: buttonPop 0.3s ease-out;
        }

        @keyframes buttonPop {
            0% { transform: scale(1.15); }
            100% { transform: scale(0.95); }
        }

        .result-section {
            background: rgba(0, 0, 0, 0.5);
            padding: 20px;
            border-radius: 10px;
            border: 2px solid #00ffff;
            margin-top: 20px;
            animation: resultBorder 2s ease-in-out infinite;
        }

        @keyframes resultBorder {
            0%, 100% {
                border-color: #00ffff;
                box-shadow: 0 0 15px rgba(0, 255, 255, 0.5), inset 0 0 15px rgba(0, 255, 255, 0.2);
            }
            50% {
                border-color: #ff00ff;
                box-shadow: 0 0 25px rgba(255, 0, 255, 0.7), inset 0 0 20px rgba(255, 0, 255, 0.3);
            }
        }

        .result-label {
            color: #00ffff;
            font-size: 1.1em;
            text-shadow: 0 0 10px #00ffff;
            margin-bottom: 10px;
        }

        .resultat {
            color: #ffff00;
            font-size: 1.8em;
            font-weight: bold;
            font-family: 'Courier New', monospace;
            text-shadow:
                0 0 10px #ffff00,
                0 0 20px #ff0080,
                0 0 30px #00ff00;
            min-height: 40px;
            animation: resultGlow 1s ease-in-out;
        }

        @keyframes resultGlow {
            0% {
                color: #ffff00;
                text-shadow: 0 0 30px #ffff00, 0 0 40px #ff0080;
                transform: scale(1.3);
            }
            50% {
                color: #00ffff;
                text-shadow: 0 0 20px #00ffff, 0 0 30px #0080ff;
                transform: scale(1.2);
            }
            100% {
                color: #ffff00;
                text-shadow: 0 0 10px #ffff00, 0 0 20px #ff0080, 0 0 30px #00ff00;
                transform: scale(1);
            }
        }

        /* Animated background pattern */
        .animated-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -10;
            overflow: hidden;
        }

        .pulse-circle {
            position: absolute;
            border-radius: 50%;
            opacity: 0.3;
            pointer-events: none;
        }

        .circle-1 {
            width: 400px;
            height: 400px;
            top: -100px;
            left: -100px;
            background: radial-gradient(circle, #ff0080 0%, transparent 70%);
            animation: pulse1 8s ease-in-out infinite;
        }

        .circle-2 {
            width: 500px;
            height: 500px;
            top: 50%;
            right: -150px;
            background: radial-gradient(circle, #00ff00 0%, transparent 70%);
            animation: pulse2 10s ease-in-out infinite;
        }

        .circle-3 {
            width: 350px;
            height: 350px;
            bottom: -80px;
            left: 30%;
            background: radial-gradient(circle, #0080ff 0%, transparent 70%);
            animation: pulse3 12s ease-in-out infinite;
        }

        @keyframes pulse1 {
            0%, 100% { transform: scale(1); opacity: 0.2; }
            50% { transform: scale(1.3); opacity: 0.4; }
        }

        @keyframes pulse2 {
            0%, 100% { transform: scale(1); opacity: 0.15; }
            50% { transform: scale(1.2); opacity: 0.35; }
        }

        @keyframes pulse3 {
            0%, 100% { transform: scale(1); opacity: 0.2; }
            50% { transform: scale(1.4); opacity: 0.4; }
        }

        /* Animated stars/sparkles */
        .sparkle {
            position: fixed;
            pointer-events: none;
            z-index: 3;
            font-size: 1.5em;
            opacity: 0;
            animation: sparkleAnimation 2s ease-out forwards;
        }

        @keyframes sparkleAnimation {
            0% {
                opacity: 1;
                transform: translate(0, 0) scale(1);
            }
            100% {
                opacity: 0;
                transform: translate(var(--tx), var(--ty)) scale(0);
            }
        }
    </style>
</head>

        <div class="bottom-gifs">

            </div>
            <div class="bottom-gif">
                <img src="https://media1.tenor.com/m/-EaySGqUBroAAAAC/neon-pink-neon-glow.gif" alt="bottom3">
            </div>
            <div class="bottom-gif">
                <img src="https://media1.tenor.com/m/9Gp-SBjrjj4AAAAC/rgb-keyboard-neon-lights.gif" alt="bottom4">
            </div>
            <div class="bottom-gif">
                <img src="https://media1.tenor.com/m/AK_rW9WpKCAAAAAC/neon-rainbow-neon-colors.gif" alt="bottom5">
            </div>
        </div>
    </main>

    <script type="module">
        import { fakultet } from './fakultet.js'
        import { fizzBuzz } from './fizzbuzz.js'
        import { fibonacci } from './fibonacci.js'

        function createSparkle(x, y) {
            const sparkles = ['✨', '⭐', '💫', '🌟', '💥'];
            const sparkle = document.createElement('div');
            sparkle.className = 'sparkle';
            sparkle.textContent = sparkles[Math.floor(Math.random() * sparkles.length)];
            sparkle.style.left = x + 'px';
            sparkle.style.top = y + 'px';
            const tx = (Math.random() - 0.5) * 200;
            const ty = (Math.random() - 0.5) * 200 - 100;
            sparkle.style.setProperty('--tx', tx + 'px');
            sparkle.style.setProperty('--ty', ty + 'px');
            document.body.appendChild(sparkle);
            setTimeout(() => sparkle.remove(), 2000);
        }

        function regnUt(seksjon, fn) {
            const card = document.querySelector(`#${seksjon}`).closest('.calc-card');
            const input = card.querySelector('input');
            const output = card.querySelector('.resultat');
            const tall = parseInt(input.value);

            if (isNaN(tall)) {
                output.textContent = 'Enter a number!';
                return;
            }

            output.textContent = fn(tall);

            // Create multiple sparkles on calculation
            const button = card.querySelector('button');
            const rect = button.getBoundingClientRect();
            for (let i = 0; i < 8; i++) {
                setTimeout(() => {
                    createSparkle(rect.left + Math.random() * rect.width, rect.top + Math.random() * rect.height);
                }, i * 50);
            }
        }

        // Set up event listeners
        document.querySelectorAll('.calc-card').forEach((card, idx) => {
            const button = card.querySelector('button');
            const seksjon = ['fakultet', 'fizzbuzz', 'fibonacci'][idx];
            const fn = [fakultet, fizzBuzz, fibonacci][idx];

            button.addEventListener('click', (e) => {
                e.preventDefault();
                regnUt(seksjon, fn);
            });

            // Allow Enter key
            card.querySelector('input').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    regnUt(seksjon, fn);
                }
            });
        });
    </script>
</body>
